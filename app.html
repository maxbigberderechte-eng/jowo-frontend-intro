<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User profile</title>
</head>
<body>
    <header> User profile </header>
    <main>
        Hello world
        <form >
            <h2> Create profile </h2>
            <div>
                <label for="name"> name: </label>
                <input type="text" placeholder="name" id="name" name="name" required>
            </div>
            <div>
                <label for="email"> email: </label>
                <input type="email" placeholder="email" id="email" name="email" required>
            </div>
            <div>
                <label for="skill"> skill: </label>
                <input type="text" placeholder="skill" id="skill" name="skill" required>
            </div>
            <div>
                <label for="about"> about: </label>
                <input type="text" placeholder="about" id="about" name="about" required>
            </div>
            <div>
                <button type="submit"> send </button>
                <button type="reset"> reset </button>
            </div>
            <section>
                <img src="./assets/images/user-profile-image.png" alt="user-profile-image" width="80" height="80">
                <h2>Name: Alex Johnson </h2>
                <p>
                    <strong> E-Mail: </strong>
                     a.johnsonn@gmail.com
                </p>
                <p>
                    <strong> Skills: </strong>
                     HTML, CSS, JavaScript
                </p>
                <p>
                    <strong> Description: </strong>
                     Frontend developer in training. Learning how to build modern web interfaces.
                </p>
                <a href="mailto:a.johnsonn@gmail.com">Message link: mailto:a.johnsonn@gmail.com </a>
            </section>
        </form>
    </main>
    <footer> ©2026 </footer>
</body>
</html>
